<!DOCTYPE html>
<html>
<head>
    <title>CSS Position</title>
    <style>
        .relative {
            position: relative;
            left: 20px;
            background: lightblue;
            padding: 10px;
        }

        .container {
            position: relative;
            border: 1px solid black;
            height: 100px;
        }

        .absolute {
            position: absolute;
            top: 10px;
            right: 10px;
            background: lightcoral;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h3>Relative Position</h3>
    <div class="relative">Relative Box</div>

    <h3>Absolute Position</h3>
    <div class="container">
        <div class="absolute">Absolute Box</div>
    </div>

</body>
</html>
