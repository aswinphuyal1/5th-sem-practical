<!DOCTYPE html>
<html>
<head>
    <title>setTimeout and setInterval</title>
</head>
<body>

    <h2 id="msg">Hello</h2>

    <script>
        // Runs once after 3 seconds
        setTimeout(function() {
            document.getElementById("msg").innerHTML =
                "Message changed after 3 seconds";
        }, 3000);

        // Runs every 1 second
        setInterval(function() {
            console.log("Running every second");
        }, 1000);
    </script>

</body>
</html>
