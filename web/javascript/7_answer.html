<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
</head>
<body>

    <h2>Digital Clock</h2>
    <h1 id="clock"></h1>

    <script>
        function showTime() {
            let d = new Date();

            let h = d.getHours();
            let m = d.getMinutes();
            let s = d.getSeconds();

            document.getElementById("clock").innerHTML =
                h + ":" + m + ":" + s;
        }

        setInterval(showTime, 1000);
    </script>

</body>
</html>
