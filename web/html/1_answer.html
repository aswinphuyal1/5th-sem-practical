<!DOCTYPE html>
<html>
<head>
    <title>Table Attributes Example</title>
    <style>
        body {
            margin: 30px; /* Page margin */
        }
    </style>
</head>
<body>

<h2>HTML Table with Margin, Rowspan, Colspan, Cellpadding, and Cellspacing</h2>

<table border="1" cellpadding="10" cellspacing="5">
    <tr>
        <th rowspan="2">Student</th>
        <th colspan="2">Marks</th>
    </tr>
    <tr>
        <th>Math</th>
        <th>Science</th>
    </tr>
    <tr>
        <td>John</td>
        <td>85</td>
        <td>90</td>
    </tr>
    <tr>
        <td>Emma</td>
        <td>88</td>
        <td>92</td>
    </tr>
</table>

</body>
</html>
